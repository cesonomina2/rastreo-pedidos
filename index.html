<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo de Pedidos | Envíos Premium</title>

    <!-- Google Fonts: Outfit for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-background"></div>

    <header class="main-header">
        <div class="container">
            <a href="#" class="brand-logo">
                <img src="https://cdn1.totalcommerce.cloud/casalimpia/web_content/assets/logo-casa-limpia.svg"
                    alt="Casalimpia Logo">
            </a>
        </div>
    </header>

    <main class="main-content">
        <section class="hero-section">
            <div class="container">
                <h2 class="hero-title">Sigue tu envío en tiempo real</h2>
                <p class="hero-subtitle">Ingresa tu número de guía para conocer el estado detallado de tu paquete.</p>

                <div class="search-container">
                    <div class="search-box">
                        <input type="text" id="tracking-input" placeholder="Ej: GUIA-12345678" autocomplete="off">
                        <button id="search-btn" aria-label="Buscar rastreo">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="results-section" class="results-section hidden">
            <div class="container">
                <div class="tracking-card">
                    <div class="card-header">
                        <div class="order-info">
                            <span class="label">Número de Guía</span>
                            <h3 class="tracking-number" id="display-tracking-id">--</h3>
                        </div>
                        <div class="status-badge" id="current-status-badge">
                            Estado Desconocido
                        </div>
                    </div>

                    <div class="client-info-grid">
                        <div class="info-item">
                            <span class="label">Cliente</span>
                            <p id="client-name">--</p>
                        </div>
                        <div class="info-item">
                            <span class="label">Destino</span>
                            <p id="destination-city">--</p>
                        </div>
                        <div class="info-item">
                            <span class="label">Estimado</span>
                            <p id="estimated-date">--</p>
                        </div>
                    </div>

                    <div class="timeline-container" id="timeline-container">
                        <!-- Timeline items will be injected here via JS -->
                    </div>
                </div>
            </div>
        </section>

        <div id="error-message" class="error-container hidden">
            <p>No encontramos un envío con ese número. Por favor verifica e intenta nuevamente.</p>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <!-- Footer content removed by request -->
        </div>
    </footer>

    <!-- script src="js/mockData.js"></script -->
    <script src="js/app.js"></script>
</body>

</html>
